name: URPG CI Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: urpg-ci-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache

jobs:
  gate1-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Validate presentation docs links
        shell: pwsh
        run: ./tools/docs/check-presentation-doc-links.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: Run focused presentation gate
        shell: pwsh
        run: ./tools/ci/run_presentation_gate.ps1 -BuildDirectory build/ci -Configuration Release -SkipBuild
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 1 tests
        run: ctest --test-dir build/ci --output-on-failure -L pr

  gate2-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        renderer_tier: [basic, standard, advanced]
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 2 tests
        env:
          URPG_RENDERER_TIER: ${{ matrix.renderer_tier }}
        run: ctest --test-dir build/ci --output-on-failure -L nightly --output-log gate2-${{ matrix.renderer_tier }}.log
      - name: Upload Gate 2 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-${{ matrix.renderer_tier }}-logs
          path: gate2-${{ matrix.renderer_tier }}.log

  gate3-weekly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate curated RPG Maker plugin drop-ins
        shell: pwsh
        run: ./tools/rpgmaker/validate-plugin-dropins.ps1 -PluginRoot third_party/rpgmaker-mz/steam-dlc/plugin-dropins-curated/js/plugins -ReportPrefix plugin_dropins_curated_ci_validation -FailOnError
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 3 tests
        run: ctest --test-dir build/ci --output-on-failure -L weekly --output-log gate3-weekly.log
      - name: Upload Gate 3 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate3-weekly-logs
          path: gate3-weekly.log
