name: URPG CI Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: urpg-ci-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache

jobs:
  gate1-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache xvfb libgl1-mesa-dev
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Validate presentation docs links
        shell: pwsh
        run: ./tools/docs/check-presentation-doc-links.ps1
      - name: Validate release readiness records
        shell: pwsh
        run: ./tools/ci/check_release_readiness.ps1
      - name: Validate schema changelog governance
        shell: pwsh
        run: ./tools/ci/check_schema_changelog.ps1
      - name: Validate save policy governance
        shell: pwsh
        run: ./tools/ci/check_save_policy_governance.ps1
      - name: Validate truth alignment
        shell: pwsh
        run: ./tools/docs/check_truth_alignment.ps1
      - name: Validate template claims
        shell: pwsh
        run: ./tools/docs/check_template_claims.ps1
      - name: Validate subsystem badges
        shell: pwsh
        run: ./tools/docs/check_subsystem_badges.ps1
      - name: Validate breaking-change governance
        shell: pwsh
        run: ./tools/ci/check_breaking_changes.ps1
      - name: Validate CMake completeness
        shell: pwsh
        run: ./tools/ci/check_cmake_completeness.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: Validate CTest discovery
        shell: pwsh
        run: ./tools/ci/check_ctest_discovery.ps1 -BuildDirectory build/ci
      - name: Configure strict warnings gate
        run: cmake --preset ci -B build/ci-warnings-as-errors -DURPG_WARNINGS_AS_ERRORS=ON
      - name: Build strict warnings gate
        run: >
          cmake --build build/ci-warnings-as-errors --target
          urpg_migrate
          urpg_project_audit
          urpg_export_smoke_app
          urpg_presentation_release_validation
          urpg_tests
          urpg_integration_tests
          urpg_snapshot_tests
          urpg_compat_tests
      - name: Configure renderer-backed snapshot gate
        run: cmake --preset ci -B build/ci-renderer-backed -DURPG_SKIP_OPENGL=OFF
      - name: Build renderer-backed snapshot gate
        run: cmake --build build/ci-renderer-backed --target urpg_snapshot_tests
      - name: Run renderer-backed snapshot gate
        shell: pwsh
        run: xvfb-run -a pwsh -File ./tools/ci/check_renderer_backed_visual_capture.ps1 -BuildDirectory build/ci-renderer-backed
      - name: Validate visual golden governance
        shell: pwsh
        run: ./tools/ci/check_visual_golden_governance.ps1
      - name: Run focused presentation gate
        shell: pwsh
        run: ./tools/ci/run_presentation_gate.ps1 -BuildDirectory build/ci -Configuration Release -SkipBuild
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 1 tests
        run: ctest --test-dir build/ci --output-on-failure -L "^pr$"

  gate2-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        renderer_tier: [basic, standard, advanced]
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Validate breaking-change governance
        shell: pwsh
        run: ./tools/ci/check_breaking_changes.ps1
      - name: Validate CMake completeness
        shell: pwsh
        run: ./tools/ci/check_cmake_completeness.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: Validate CTest discovery
        shell: pwsh
        run: ./tools/ci/check_ctest_discovery.ps1 -BuildDirectory build/ci
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 2 tests
        env:
          URPG_RENDERER_TIER: ${{ matrix.renderer_tier }}
        run: ctest --test-dir build/ci --output-on-failure -L "^nightly$" --output-log gate2-${{ matrix.renderer_tier }}.log
      - name: Upload Gate 2 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-${{ matrix.renderer_tier }}-logs
          path: gate2-${{ matrix.renderer_tier }}.log

  gate3-weekly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate curated RPG Maker plugin drop-ins
        shell: pwsh
        run: ./tools/rpgmaker/validate-plugin-dropins.ps1 -PluginRoot third_party/rpgmaker-mz/steam-dlc/plugin-dropins-curated/js/plugins -ReportPrefix plugin_dropins_curated_ci_validation -FailOnError
      - name: Install sccache
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-sccache-
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-
      - name: Validate known-break waivers
        shell: pwsh
        run: ./tools/ci/check_waivers.ps1
      - name: Validate breaking-change governance
        shell: pwsh
        run: ./tools/ci/check_breaking_changes.ps1
      - name: Verify sccache
        run: |
          which sccache
          sccache --version
          sccache --zero-stats || true
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci-release
      - name: Validate CTest discovery
        shell: pwsh
        run: ./tools/ci/check_ctest_discovery.ps1 -BuildDirectory build/ci
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Run Gate 3 tests
        run: ctest --test-dir build/ci --output-on-failure -L "^weekly$" --output-log gate3-weekly.log
      - name: Upload Gate 3 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate3-weekly-logs
          path: gate3-weekly.log
