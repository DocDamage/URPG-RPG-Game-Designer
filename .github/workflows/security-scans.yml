name: Security Scans

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  codeql:
    if: (github.event.repository.private == false || vars.ENABLE_CODEQL_PRIVATE == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [cpp, python]
    steps:
      - uses: actions/checkout@v4
      - name: Install sccache
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache
      - name: sccache stats (before build)
        if: matrix.language == 'cpp'
        run: sccache --show-stats || true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Configure (C++)
        if: matrix.language == 'cpp'
        run: cmake --preset ci
      - name: Build (C++)
        if: matrix.language == 'cpp'
        run: cmake --build --preset ci-release
      - name: sccache stats (after build)
        if: always() && matrix.language == 'cpp'
        run: sccache --show-stats || true
      - name: Analyze
        uses: github/codeql-action/analyze@v3
